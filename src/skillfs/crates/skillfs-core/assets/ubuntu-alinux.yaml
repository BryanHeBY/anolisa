# Ubuntu ↔ Alinux conversion rules — SkillFS built-in catalog
# ══════════════════════════════════════════════════════════════════
# Each rule is a YAML mapping with these fields:
#   ubuntu      — literal substring as it appears in Ubuntu/Debian-style content
#   alinux      — literal substring it should be rewritten to on Alinux/Anolis-style
#   direction   — bidirectional | ubuntu_to_alinux_only | alinux_to_ubuntu_only
#   auto_apply  — always | never (REQUIRED; the only eligibility field)
#                 always → SkillFS applies this rule in an allowed direction
#                 never  → SkillFS loads the rule but never applies it
#   confidence  — high | medium | low (OPTIONAL annotation; inert at runtime)
#   notes       — OPTIONAL human-readable comment (inert at runtime)
#
# SkillFS decides eligibility solely from auto_apply. confidence and notes are
# accepted for human review but never change behavior: SkillFS performs no
# verification, Repology lookup, network call, subprocess, or LLM review. In
# this catalog high-confidence rules are auto_apply: always; medium and low
# rules are included as auto_apply: never so they are documented but inert.
#
# MATCHING: SkillFS applies rules in a single left-to-right pass over the
# original text. At each position the LONGEST matching source pattern wins
# (most specific first), its replacement is emitted, and the scan skips past
# the matched span. Neither the replacement nor already-scanned text is
# rewritten again, so results do NOT depend on rule order and overlapping
# patterns never cascade (e.g. "apache2" never rewrites inside "apache2-utils",
# and "cron" never re-hits the "crond" a longer rule produced).
#
# Ineligible rules (auto_apply: never, identity, or direction-disallowed) still
# take part in the scan as protection matches: when one is the longest match at
# a position it is emitted unchanged and skipped, so a shorter eligible rule
# cannot rewrite inside a span such a rule claims. An eligible substitution
# always wins over protection for the same source.
# ══════════════════════════════════════════════════════════════════


# ──────────────────────────────────────────────────────────────────────
# 1. Package manager — install / remove / upgrade verbs
# ──────────────────────────────────────────────────────────────────────

- ubuntu: "sudo apt-get install -y "
  alinux: "sudo dnf install -y "
  direction: bidirectional
  auto_apply: always
  confidence: high

- ubuntu: "apt-get install -y "
  alinux: "dnf install -y "
  direction: bidirectional
  auto_apply: always
  confidence: high

- ubuntu: "sudo apt install -y "
  alinux: "sudo dnf install -y "
  direction: ubuntu_to_alinux_only
  auto_apply: always
  confidence: high

- ubuntu: "apt install -y "
  alinux: "dnf install -y "
  direction: ubuntu_to_alinux_only
  auto_apply: always
  confidence: high

- ubuntu: "apt-get install "
  alinux: "dnf install -y "
  direction: ubuntu_to_alinux_only
  auto_apply: always
