# ANOLISA execution policy (schema v1).
#
# Source of truth for which capabilities the CLI is currently willing to drive
# end-to-end (`anolisa enable <cap> [--dry-run]`). The CLI scope-gate consults
# this file instead of carrying a hard-coded `SUPPORTED_CAPABILITY` constant
# so adding a new validated capability does not require a Rust change.
#
# Semantics:
#
# * `name`               — capability name (must match the capability manifest
#                           under `manifests/capabilities/<name>.toml`).
# * `enabled`            — global feature switch. `false` means we treat this
#                           entry as if it were absent. Defaults to `true`.
# * `allow_execute`      — when `true`, both `enable <cap> --dry-run` and the
#                           real-execute path are allowed. When `false` (or
#                           when the capability is missing from this file),
#                           the CLI surfaces `NOT_IMPLEMENTED` so the scope
#                           boundary stays visible to users.
# * `supported_backends` — informational: which artifact backends the install
#                           runner is wired for today. Not consulted by the
#                           scope gate yet (the install runner enforces its
#                           own backend allow-list at runtime); we record it
#                           here so the policy file is a single declaration
#                           of "what's actually executable end-to-end".
# * `notes`              — free-form provenance / milestone marker.

schema_version = 1

[[capabilities]]
name = "agent-observability"
enabled = true
allow_execute = true
supported_backends = ["binary", "tar_gz"]
notes = "P1-F / P1-G0 — first real capability (AgentSight)."

[[capabilities]]
name = "token-optimization"
enabled = true
allow_execute = true
supported_backends = ["binary", "tar_gz"]
notes = "P1-H — second capability (tokenless) validating that enable is not an AgentSight special case."

[[capabilities]]
name = "cosh"
enabled = true
allow_execute = true
supported_backends = ["tar_gz"]
notes = "P1-J — COSH raw/tar_gz release from OSS."
