[component]
name = "ws-ckpt"
version = "0.4.1"
layer = "runtime"
domain = "state"
display_name = "Workspace Checkpoint"
description = "Workspace checkpoint - btrfs COW session-level isolation and rollback"
owner = "ws-ckpt-team"
license = "Apache-2.0"
repository = "https://github.com/alibaba/anolisa"

[component.contract]
schema_version = "1.0"
min_anolisa_version = "0.1.16"

[backends.rpm]
package = "ws-ckpt"

[component.platform]
os = ["linux"]
arch = ["x86_64"]
min_kernel = "5.4"

[[component.dependencies]]
name = "btrfs-progs"
kind = "system-package"
probe = "btrfs version"
packages = { rpm = "btrfs-progs", deb = "btrfs-progs" }

[[component.dependencies]]
name = "rsync"
kind = "system-package"
probe = "rsync --version"
packages = { rpm = "rsync", deb = "rsync" }

[[component.dependencies]]
name = "btrfs"
kind = "platform-capability"
check = "btrfs"
min_kernel = "5.4"

[component.layout]
modes = ["system"]

[[component.layout.files]]
source = ".anolisa/component.toml"
target = "{datadir}/components/ws-ckpt/component.toml"
mode = "0644"

[[component.layout.files]]
source = "bin/ws-ckpt"
target = "{bindir}/ws-ckpt"
mode = "0755"
type = "executable"

[[component.layout.files]]
source = "share/anolisa/runtime/skills/ws-ckpt/"
target = "{datadir}/runtime/skills/ws-ckpt"

[[component.layout.files]]
source = "share/anolisa/skills/ws-ckpt/"
target = "{datadir}/skills/ws-ckpt"

[[component.layout.files]]
source = "share/anolisa/ws-ckpt/ws-ckpt.service"
target = "{unitdir}/ws-ckpt.service"
mode = "0644"

[[component.layout.files]]
source = "share/anolisa/ws-ckpt/config.toml.sample"
target = "{datadir}/ws-ckpt/config.toml.sample"
mode = "0644"
type = "config"

[[component.layout.files]]
source = "share/anolisa/hooks/ws-ckpt/pre-uninstall.sh"
target = "{datadir}/hooks/ws-ckpt/pre-uninstall.sh"
mode = "0755"
type = "executable"

[[component.layout.files]]
source = "share/anolisa/adapters/ws-ckpt/manifest.json"
target = "{datadir}/adapters/ws-ckpt/manifest.json"
mode = "0644"

[[component.layout.files]]
source = "share/anolisa/adapters/ws-ckpt/openclaw/"
target = "{datadir}/adapters/ws-ckpt/openclaw"

[[component.layout.files]]
source = "share/anolisa/adapters/ws-ckpt/hermes/"
target = "{datadir}/adapters/ws-ckpt/hermes"

[[component.services]]
unit = "ws-ckpt.service"
scope = "system"
enable = true
start = true

[[component.hooks]]
phase = "pre_uninstall"
script = "{datadir}/hooks/ws-ckpt/pre-uninstall.sh"
timeout_secs = 300
strict = false

[component.health_check]
type = "binary_version"
binary = "{bindir}/ws-ckpt"
timeout_secs = 5

[[adapters]]
framework = "openclaw"
name = "ws-ckpt-openclaw"
display_name = "ws-ckpt for OpenClaw"
adapter_type = "plugin"
trust = "first-party"
plugin_id = "ws-ckpt"
source = "scripts/openclaw"
dest = "{datadir}/runtime/ws-ckpt/plugins/openclaw/"
detect = { binary = "openclaw" }

[adapters.bundle]
schema = 1
entry = "openclaw.plugin.json"

[adapters.openclaw.bundle]
schema = 1
entry = "openclaw.plugin.json"

[[adapters]]
framework = "hermes"
name = "ws-ckpt-hermes"
display_name = "ws-ckpt for Hermes"
adapter_type = "plugin"
trust = "first-party"
plugin_id = "ws-ckpt"
source = "scripts/hermes"
dest = "{datadir}/runtime/ws-ckpt/plugins/hermes/"
detect = { binary = "hermes" }

[adapters.bundle]
schema = 1
entry = "plugin.yaml"

[adapters.hermes.bundle]
schema = 1
entry = "plugin.yaml"
