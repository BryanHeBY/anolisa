[component]
name = "skillfs"
version = "0.3.3"
layer = "runtime"
domain = "tools"
display_name = "SkillFS"
description = "AI agent skill management via virtual filesystem"
stability = "experimental"
license = "Apache-2.0"
repository = "https://github.com/alibaba/anolisa"

[component.contract]
schema_version = "1.0"
min_anolisa_version = "0.1.16"

[backends.rpm]
package = "skillfs"

[component.platform]
os = ["linux"]
arch = ["x86_64"]

[[component.dependencies]]
name = "fuse3"
kind = "system-package"
packages = { rpm = "fuse3", deb = "fuse3" }

[component.layout]
modes = ["system"]

[[component.layout.files]]
source = ".anolisa/component.toml"
target = "{datadir}/components/skillfs/component.toml"
mode = "0644"

[[component.layout.files]]
source = "bin/skillfs"
target = "{bindir}/skillfs"
mode = "0755"
type = "executable"

[[component.layout.files]]
source = "share/anolisa/runtime/skills/skillfs/"
target = "{datadir}/runtime/skills/skillfs"

[component.health_check]
type = "binary_version"
binary = "{bindir}/skillfs"
timeout_secs = 5

