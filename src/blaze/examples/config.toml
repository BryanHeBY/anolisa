# SPDX-License-Identifier: Apache-2.0
# Example blaze daemon configuration.
#
# Production deployments install this file at /etc/anolisa/blaze/config.toml.
# All fields shown below include their default values; you only need to
# specify values that differ from the defaults.

# ---------------------------------------------------------------------------
# Daemon global settings.
# ---------------------------------------------------------------------------
[daemon]
# Log verbosity level. The daemon uses the `tracing` crate internally.
# Options: trace, debug, info, warn, error.  Default: "info".
log_level = "info"

# Root directory for persistent daemon state (instance metadata, templates,
# images). The daemon creates subdirectories automatically on first startup.
# Default: "/var/lib/blaze".
state_dir = "/var/lib/blaze"

# Path to the Unix domain socket for local API access.
# Clients connect via: curl --unix-socket <path> http://localhost/v1/...
# Default: "/run/blaze/api.sock".
socket = "/run/blaze/api.sock"

# ---------------------------------------------------------------------------
# Optional TCP listener for remote API access.
# ---------------------------------------------------------------------------
[listen]
# TCP bind address for remote HTTP API.
# Leave empty or omit to disable TCP (UDS-only mode).
# When set, platforms (Substrate, E2B orchestrators) can reach the daemon
# over the network.  Example: "0.0.0.0:14159".
# Default: "" (disabled).
http_addr = ""

# ---------------------------------------------------------------------------
# Backend binary paths.
# Maps backend name → absolute path to the executable.
# The daemon probes each configured backend at startup; backends whose
# binaries are missing or non-executable are logged and skipped.
# ---------------------------------------------------------------------------
[backends]
# Supported backend names (kebab-case):
#   firecracker, gvisor, gvisor-substrate, rund, kata-fc, kata-clh,
#   kata-qemu, runc, bubblewrap.
firecracker = "/usr/bin/firecracker"
bubblewrap = "/usr/bin/bwrap"
# Phase 2+ backends (uncomment when spawner implementations land):
# gvisor = "/usr/bin/runsc"
# rund = "/usr/bin/rund"
# kata-fc = "/usr/bin/containerd-shim-kata-v2"
# kata-clh = "/usr/bin/containerd-shim-kata-v2"
# kata-qemu = "/usr/bin/containerd-shim-kata-v2"
# runc = "/usr/bin/runc"

# ---------------------------------------------------------------------------
# Policy engine settings.
# ---------------------------------------------------------------------------
[policy]
# Directory containing policy TOML files. The daemon loads all *.toml files
# in this directory at startup.  Default: "/etc/anolisa/blaze/policies".
dir = "/etc/anolisa/blaze/policies"

# Behavior when a policy file fails to parse or validate.
# Options: "fail" (abort daemon startup), "warn" (log and skip the file).
# Default: "fail".
on_load_error = "fail"

# ---------------------------------------------------------------------------
# Image storage settings.
# ---------------------------------------------------------------------------
[storage]
# Primary directory for vmlinux kernels, rootfs base images, and memfile
# bases. All runtime image files are resolved relative to this path.
# Default: "/var/lib/blaze/images".
images_dir = "/var/lib/blaze/images"

# Storage provider backend. Currently supported: "file".
# Additional providers may be registered at runtime.
provider = "file"

# Number of pre-warmed storage slots to keep ready in the pool.
# pool_size = 0           # [Reserved] Warm pool slots (not yet active)

# Whether to prefork (pre-allocate) storage slots at daemon startup.
# prefork = false         # [Reserved] Pre-start VMs in pool (not yet active)

# Interval between flush-dirty sweeps.
# flush_interval = "30s"   # [Reserved] Dirty data flush period (not yet active)

# ---------------------------------------------------------------------------
# Instance pool settings (global defaults for warm-pool recycling).
# Per-workload pool settings are configured in each policy file.
# ---------------------------------------------------------------------------
[pool]
# Default time-to-live for warm (idle) instances before the GC reclaims them.
# Format: duration string (e.g. "30m", "1h", "90s").  Default: "30m".
default_warm_ttl = "30m"

# How often the garbage collector runs to reap expired warm instances.
# Format: duration string.  Default: "5m".
gc_interval = "5m"

# ---------------------------------------------------------------------------
# Template engine settings (memory-template sharing).
# ---------------------------------------------------------------------------
[template]
# Directory where the daemon stores template snapshots.
# Default: "/var/lib/blaze/templates".
dir = "/var/lib/blaze/templates"

# How often the template GC runs to evict unused templates.
# Format: duration string.  Default: "10m".
gc_interval = "10m"

# Time a template must be idle (no active references) before eviction.
# Format: duration string.  Default: "1h".
idle_ttl = "1h"

# ---------------------------------------------------------------------------
# Metrics / observability.
# ---------------------------------------------------------------------------
[metrics]
# Path to the Unix domain socket serving Prometheus metrics.
# A Prometheus scraper can connect here to pull /metrics.
# Default: "/run/blaze/metrics.sock".
prometheus_socket = "/run/blaze/metrics.sock"
